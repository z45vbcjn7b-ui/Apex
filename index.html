const el = (tag, props={}, ...children) => {
  const e = document.createElement(tag);
  const {style, onClick, ...attrs} = props;
  if(style) Object.assign(e.style, style);
  if(onClick) e.addEventListener("click", onClick);
  Object.entries(attrs).forEach(([k,v]) => { if(v!==undefined && k!=="style" && k!=="onClick") e.setAttribute(k,v); });
  children.flat().forEach(c => { if(c==null) return; e.appendChild(typeof c==="string" ? document.createTextNode(c) : c); });
  return e;
};

function scoreColor(s){ return s>=70?C.green:s>=40?C.amber:C.red; }

function ringSVG(score,color,size=110,customLabel=null){
  const stroke=7, r=(size-stroke)/2, c=2*Math.PI*r;
  const offset=c-(score/100)*c;
  const wrap=el("div",{style:{position:"relative",width:size+"px",height:size+"px"}});
  wrap.innerHTML=`<svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${C.border}" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round" style="transition:stroke-dashoffset 0.8s ease"/>
  </svg>`;
  wrap.appendChild(el("div",{style:{position:"absolute",top:"0",left:"0",width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center"}},
    el("div",{style:{fontFamily:"Syne,sans-serif",fontSize:(size*0.22)+"px",fontWeight:"800",color}},customLabel!==null?customLabel:Math.round(score)+"%")
  ));
  return wrap;
}

function barChart(data,labels,color){
  if(!data||!data.length||!data.some(v=>v>0)) return el("div",{style:{color:C.sub,fontSize:"12px",padding:"16px",textAlign:"center"}},"Pas encore de données");
  const max=Math.max(...data)||1;
  const wrap=el("div",{style:{display:"flex",alignItems:"flex-end",gap:"4px",height:"70px"}});
  data.forEach((v,i)=>{
    wrap.appendChild(el("div",{style:{flex:"1",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}},
      el("div",{style:{width:"100%",background:C.border,borderRadius:"3px",height:"56px",display:"flex",alignItems:"flex-end",overflow:"hidden"}},
        el("div",{style:{width:"100%",height:`${(v/max)*100}%`,background:`linear-gradient(to top,${color},${color}88)`,borderRadius:"3px",minHeight:v>0?"2px":"0"}})
      ),
      el("span",{style:{fontSize:"8px",color:C.sub}},labels[i]||"")
    ));
  });
  return wrap;
}

function lineChart(datasets,labels,height=80){
  const width=320;
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox",`0 0 ${width} ${height}`);
  svg.setAttribute("width","100%");
  svg.setAttribute("height",height);
  svg.style.overflow="visible";
  const allVals=datasets.flatMap(d=>d.data);
  const max=Math.max(...allVals)||1, min=Math.min(0,...allVals);
  datasets.forEach(d=>{
    const pts=d.data.map((v,i)=>{
      const x=(i/(d.data.length-1||1))*width;
      const y=height-((v-min)/(max-min||1))*(height-8)-4;
      return `${x},${y}`;
    }).join(" ");
    svg.innerHTML+=`<polyline points="${pts}" fill="none" stroke="${d.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>`;
    const last=pts.split(" ").pop().split(",");
    svg.innerHTML+=`<circle cx="${last[0]}" cy="${last[1]}" r="3" fill="${d.color}"/>`;
  });
  return svg;
}

function bioAge(hrv,fcRepos,sommeil,realAge){
  // Base = âge réel si connu, sinon 25 (profil jeune adulte actif par défaut)
  const base = realAge || 25;
  let delta = 0;

  // HRV : normes par tranche d'âge
  // 15-25 ans : normal 60-100ms | 25-35 ans : normal 50-80ms | 35+ : normal 40-70ms
  const hrvTarget = base<25 ? 75 : base<35 ? 65 : 55;
  if(hrv>0){
    if(hrv >= hrvTarget+20) delta-=3;
    else if(hrv >= hrvTarget) delta-=1;
    else if(hrv >= hrvTarget-15) delta+=1;
    else if(hrv >= hrvTarget-30) delta+=3;
    else delta+=5;
  }

  // FC repos : normes universelles (moins sensibles à l'âge)
  if(fcRepos>0){
    if(fcRepos<=45) delta-=4;
    else if(fcRepos<=55) delta-=2;
    else if(fcRepos<=65) delta+=0;
    else if(fcRepos<=75) delta+=2;
    else delta+=4;
  }

  // Sommeil
  if(sommeil>0){
    if(sommeil>=8) delta-=2;
    else if(sommeil>=7) delta-=1;
    else if(sommeil>=6) delta+=1;
    else delta+=3;
  }

  return Math.max(10, Math.round(base + delta));
}

async function fetchAllData(){
  try {
    const res=await fetch(APPS_SCRIPT_URL);
    const json=await res.json();
    const norm=arr=>(arr||[]).map(r=>{const o={};Object.keys(r).forEach(k=>{o[k.trim()]=r[k];});return o;});
    return {watch:norm(json.watch),checkin:norm(json.checkin)};
  } catch(e){return {watch:[],checkin:[]};}
}

function metricStats(key,week){
  const fm={hrv:r=>r.HRV||0,sleep:r=>r.sommeil_h||0,fc:r=>r.FC_repos||0};
  if(!fm[key]) return null;
  const vals=week.map(fm[key]).filter(v=>v>0);
  if(!vals.length) return null;
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  const last=vals[vals.length-1];
  const prev=vals.length>1?vals[vals.length-2]:last;
  return {avg:Math.round(avg*10)/10,last,trend:Math.round((last-prev)*10)/10};
}

  ].forEach(m=>{
    const card=el("div",{style:{background:C.card,borderRadius:"18px",padding:"16px",display:"flex",flexDirection:"column",alignItems:"center",gap:"4px",cursor:"pointer",transition:"transform 0.15s ease"},
      onClick:()=>{state.detailMetric=m.key;render();}});
    card.addEventListener("mousedown",()=>card.style.transform="scale(0.97)");
    card.addEventListener("mouseup",()=>card.style.transform="scale(1)");
    card.addEventListener("touchstart",()=>card.style.transform="scale(0.97)",{passive:true});
    card.addEventListener("touchend",()=>card.style.transform="scale(1)",{passive:true});
    card.appendChild(ringSVG(m.pct,m.color,90,m.customLabel||null));
    card.appendChild(el("div",{style:{fontFamily:"Syne,sans-serif",fontSize:"18px",fontWeight:"800",color:C.text,marginTop:"4px"}},m.value+(m.unit&&typeof m.value==="number"?" "+m.unit:"")));
    card.appendChild(el("div",{style:{fontSize:"10px",fontWeight:"700",color:C.sub,letterSpacing:"0.06em",textTransform:"uppercase"}},m.label));
    kpiGrid.appendChild(card);
  });
  main.appendChild(kpiGrid);

  // ─── MÉTRIQUES AVANCÉES ───
  {
    const ba = bioAge(hrv,fcRepos,sommeilH,state.realAge);
    const baColor = ba<=28?C.green:ba<=38?C.cyan:ba<=48?C.amber:C.red;

    // Dette de sommeil 7j
    const sleepVals = week.map(r=>parseFloat(r.sommeil_h||0)||0).filter(v=>v>0);
    const avgSleep = sleepVals.length ? sleepVals.reduce((a,b)=>a+b,0)/sleepVals.length : 0;
    const sleepDebt = sleepVals.length ? Math.max(0, Math.round((8-avgSleep)*sleepVals.length*10)/10) : null;

    // Régularité du sommeil (écart-type des durées)
    const sleepStd = sleepVals.length>1 ? Math.sqrt(sleepVals.reduce((s,v)=>{const d=v-avgSleep;return s+d*d;},0)/sleepVals.length) : null;
    const sleepRegScore = sleepStd!==null ? Math.max(0,Math.round(100-sleepStd*30)) : null;

    // Ratio récupération HRV/FC
    const recovRatio = hrv>0&&fcRepos>0 ? Math.round((hrv/fcRepos)*10)/10 : null;

    const advSection = el("div",{style:{background:C.card,borderRadius:"18px",padding:"16px",marginBottom:"12px"}});
    advSection.appendChild(el("div",{style:{fontSize:"11px",fontWeight:"700",color:C.sub,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"14px"}},"🔬 Métriques avancées"));

    // Grille 2 colonnes
    const advGrid = el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}});

    const metricTile = (emoji,label,value,unit,color,sub)=>{
      const tile=el("div",{style:{background:C.surface,borderRadius:"14px",padding:"12px"}});
      tile.appendChild(el("div",{style:{fontSize:"16px",marginBottom:"4px"}},emoji));
      tile.appendChild(el("div",{style:{fontFamily:"Syne,sans-serif",fontSize:"20px",fontWeight:"800",color:color||C.text}},value!==null?String(value)+(unit?" "+unit:""):"—"));
      tile.appendChild(el("div",{style:{fontSize:"10px",fontWeight:"700",color:C.sub,marginTop:"2px",letterSpacing:"0.04em"}},label));
      if(sub) tile.appendChild(el("div",{style:{fontSize:"9px",color:C.sub,marginTop:"2px",lineHeight:"1.3"}},sub));
      return tile;
    };

    // Tuile âge biologique avec comparaison
    const baTile = el("div",{style:{background:C.surface,borderRadius:"14px",padding:"12px"}});
    baTile.appendChild(el("div",{style:{fontSize:"16px",marginBottom:"4px"}},"🧬"));
    baTile.appendChild(el("div",{style:{fontFamily:"Syne,sans-serif",fontSize:"20px",fontWeight:"800",color:baColor}},ba+" ans"));
    baTile.appendChild(el("div",{style:{fontSize:"10px",fontWeight:"700",color:C.sub,marginTop:"2px",letterSpacing:"0.04em"}},"Âge biologique"));
    if(state.realAge){
      const diff = state.realAge - ba;
      const diffColor = diff>0?C.green:diff<0?C.red:C.sub;
      const diffText = diff>0?`${diff} ans plus jeune 🎉`:diff<0?`${Math.abs(diff)} ans plus vieux ⚠`:` = ton âge réel`;
      baTile.appendChild(el("div",{style:{fontSize:"9px",color:diffColor,marginTop:"4px",fontWeight:"700"}},diffText));
    } else {
      const ageBtn = el("button",{
        style:{fontSize:"9px",color:C.purple,marginTop:"4px",background:"none",border:"none",padding:"0",textDecoration:"underline",cursor:"pointer"},
        onClick:()=>{state.showAgeInput=true;render();}
      },"Entrer mon âge réel");
      baTile.appendChild(ageBtn);
    }
    advGrid.appendChild(baTile);
    advGrid.appendChild(metricTile("😴","Dette de sommeil",sleepDebt,"h",sleepDebt!==null?(sleepDebt<3?C.green:sleepDebt<7?C.amber:C.red):C.sub,"vs 8h/nuit sur 7j"));
    advGrid.appendChild(metricTile("📊","Régularité sommeil",sleepRegScore,"%",sleepRegScore!==null?scoreColor(sleepRegScore):C.sub,"Variation des durées 7j"));
    advGrid.appendChild(metricTile("💫","Ratio HRV/FC",recovRatio,"",recovRatio!==null?(recovRatio>1?C.green:recovRatio>0.6?C.amber:C.red):C.sub,"Équilibre nerveux/cardio"));

    // Ligne séparateur
    advGrid.appendChild(el("div",{style:{gridColumn:"1/-1",height:"1px",background:C.border,margin:"2px 0"}}));

    // Métriques à venir (greyed out)
    [
      {e:"🏃",l:"Charge entraînement",s:"Disponible avec Strava"},
      {e:"🌊",l:"Sommeil profond %",s:"Disponible avec phases sommeil"},
      {e:"🧠",l:"Sommeil paradoxal %",s:"Disponible avec phases sommeil"},
      {e:"📈",l:"Tendance de forme 30j",s:"Disponible après 30 jours de données"},
    ].forEach(m=>{
      const tile=el("div",{style:{background:C.surface,borderRadius:"14px",padding:"12px",opacity:"0.5"}});
      tile.appendChild(el("div",{style:{fontSize:"16px",marginBottom:"4px"}},m.e));
      tile.appendChild(el("div",{style:{fontFamily:"Syne,sans-serif",fontSize:"20px",fontWeight:"800",color:C.sub}},"—"));
      tile.appendChild(el("div",{style:{fontSize:"10px",fontWeight:"700",color:C.sub,marginTop:"2px"}},m.l));
      tile.appendChild(el("div",{style:{fontSize:"9px",color:C.sub,marginTop:"2px",fontStyle:"italic"}},m.s));
      advGrid.appendChild(tile);
    });

    advSection.appendChild(advGrid);
    main.appendChild(advSection);
  }

  // ─── GRAPHIQUES ÉVOLUTION ───
  const graphSection=el("div",{style:{background:C.card,borderRadius:"18px",padding:"16px",marginBottom:"12px"}});
  graphSection.appendChild(el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}},
    el("div",{style:{fontSize:"12px",fontWeight:"700",color:C.sub,letterSpacing:"0.06em",textTransform:"uppercase"}},"📈 Évolution 7 jours"),
    el("div",{style:{display:"flex",gap:"12px"}},
      ...[{l:"HRV",c:C.purple},{l:"Sommeil",c:C.cyan},{l:"FC",c:C.amber}].map(d=>
        el("div",{style:{display:"flex",alignItems:"center",gap:"4px"}},
          el("div",{style:{width:"8px",height:"2px",background:d.c,borderRadius:"1px"}}),
          el("span",{style:{fontSize:"9px",color:C.sub}},d.l)
        )
      )
    )
  ));
  const normalizedData=[
    {color:C.purple,data:week.map(r=>parseFloat(r.HRV||0)||0)},
    {color:C.cyan,data:week.map(r=>(parseFloat(r.sommeil_h||0)||0)*10)},
    {color:C.amber,data:week.map(r=>parseFloat(r.FC_repos||0)||0)},
  ];
  graphSection.appendChild(lineChart(normalizedData,labels,80));
  main.appendChild(graphSection);

  // ─── CHECK-IN COMPACT (toutes questions visibles) ───
  const answers = state.checkinDone ? {...state.checkinAnswers} : state.checkinCurrentAnswers;
  const allAnswered = QUESTIONS.every(q => q.id in answers);

  const checkinSection=el("div",{style:{background:C.card,borderRadius:"18px",padding:"16px",marginBottom:"12px"}});
  
  // Header
  const doneCount = QUESTIONS.filter(q=>q.id in answers).length;
  checkinSection.appendChild(el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}},
    el("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
      el("div",{style:{fontSize:"16px"}},"☀️"),
      el("div",{style:{fontSize:"13px",fontWeight:"700",color:C.text}},"Check-in matin")
    ),
    el("div",{style:{fontSize:"10px",color:doneCount>=QUESTIONS.length?C.green:C.sub,fontWeight:"600"}},`${doneCount}/${QUESTIONS.length}`)
  ));

  // Toutes les questions compactes
  QUESTIONS.forEach(q=>{
    const val=answers[q.id];
    const isAnswered=val!==undefined;
    const qRow=el("div",{style:{marginBottom:"10px"}});
    
    // Label compact
    qRow.appendChild(el("div",{style:{fontSize:"11px",color:isAnswered?C.sub:C.text,fontWeight:"600",marginBottom:"5px"}},q.emoji+" "+q.label));

    if(q.type==="number"){
      const inp=document.createElement("input");
      inp.type="number";
      inp.placeholder=q.placeholder||"0";
      inp.value=val||"";
      Object.assign(inp.style,{width:"100%",padding:"7px 10px",borderRadius:"8px",border:`1px solid ${isAnswered?C.purple:C.border}`,background:C.surface,color:C.text,fontSize:"14px",fontFamily:"inherit"});
      inp.addEventListener("change",()=>{
        const v=inp.value.trim();
        if(v){ answers[q.id]=v; saveAndCheck(answers); }
      });
      qRow.appendChild(inp);
    } else if(q.type==="scale"){
      const row=el("div",{style:{display:"flex",gap:"4px"}});
      const btns=[];
      q.scale.forEach((label,i)=>{
        const isSelected=val===(i+1);
        const btn=el("button",{
          style:{flex:"1",padding:"5px 2px",borderRadius:"7px",border:`1px solid ${isSelected?C.purple:C.border}`,background:isSelected?`${C.purple}33`:C.surface,color:isSelected?C.purple:C.sub,fontSize:"9px",fontWeight:isSelected?"700":"400",textAlign:"center",lineHeight:"1.3",transition:"all 0.1s ease"},
          onClick:()=>{
            answers[q.id]=i+1;
            btns.forEach((b,j)=>{
              const sel=j===i;
              b.style.border=`1px solid ${sel?C.purple:C.border}`;
              b.style.background=sel?`${C.purple}33`:C.surface;
              b.style.color=sel?C.purple:C.sub;
              b.style.fontWeight=sel?"700":"400";
            });
            saveAndCheck(answers);
          }
        },label);
        btns.push(btn);
        row.appendChild(btn);
      });
      qRow.appendChild(row);
    } else if(q.type==="choice"){
      const row=el("div",{style:{display:"flex",gap:"4px"}});
      const btns=[];
      q.choices.forEach((label,i)=>{
        const isSelected=val===label;
        const btn=el("button",{
          style:{flex:"1",padding:"5px 2px",borderRadius:"7px",border:`1px solid ${isSelected?C.cyan:C.border}`,background:isSelected?`${C.cyan}22`:C.surface,color:isSelected?C.cyan:C.sub,fontSize:"9px",fontWeight:isSelected?"700":"400",textAlign:"center",transition:"all 0.1s ease"},
          onClick:()=>{
            answers[q.id]=label;
            btns.forEach((b,j)=>{
              const sel=j===i;
              b.style.border=`1px solid ${sel?C.cyan:C.border}`;
              b.style.background=sel?`${C.cyan}22`:C.surface;
              b.style.color=sel?C.cyan:C.sub;
              b.style.fontWeight=sel?"700":"400";
            });
            saveAndCheck(answers);
          }
        },label);
        btns.push(btn);
        row.appendChild(btn);
      });
      qRow.appendChild(row);
    } else {
      const row=el("div",{style:{display:"flex",gap:"6px"}});
      const btns=[];
      ["Oui","Non"].forEach((label,i)=>{
        const isSelected=val===label;
        const color=i===0?C.green:C.red;
        const btn=el("button",{
          style:{flex:"1",padding:"6px",borderRadius:"7px",border:`1px solid ${isSelected?color:C.border}`,background:isSelected?`${color}22`:C.surface,color:isSelected?color:C.sub,fontSize:"11px",fontWeight:isSelected?"700":"400",transition:"all 0.1s ease"},
          onClick:()=>{
            answers[q.id]=label;
            btns.forEach((b,j)=>{
              const c2=j===0?C.green:C.red;
              const sel=j===i;
              b.style.border=`1px solid ${sel?c2:C.border}`;
              b.style.background=sel?`${c2}22`:C.surface;
              b.style.color=sel?c2:C.sub;
              b.style.fontWeight=sel?"700":"400";
            });
            saveAndCheck(answers);
          }
        },(i===0?"✓ ":"✗ ")+label);
        btns.push(btn);
        row.appendChild(btn);
      });
      qRow.appendChild(row);
    }
    checkinSection.appendChild(qRow);
  });

  // Bouton valider si pas encore fait
  if(!state.checkinDone && allAnswered){
    checkinSection.appendChild(el("button",{
      style:{width:"100%",marginTop:"10px",padding:"12px",borderRadius:"12px",border:"none",background:`linear-gradient(135deg,${C.purple},${C.cyan})`,color:"#fff",fontSize:"14px",fontWeight:"700"},
      onClick:()=>{
        state.checkinAnswers={...answers};
        state.checkinDone=true;
        const k=new Date().toLocaleDateString("fr-FR");
        try{localStorage.setItem("apex_checkin_"+k,JSON.stringify(state.checkinAnswers));}catch(e){}
        sendCheckin(state.checkinAnswers);
        loadAI();
        render();
      }
    },"✓ Enregistrer le check-in"));
  }

  main.appendChild(checkinSection);

  // ─── ANALYSES IA ───
  if(state.checkinDone && deduped.length>0){
    const sections=[
      {key:"recovery",icon:"⟳",label:"Récupération",tipIcons:["💧","😴","🧘"]},
      {key:"sleep",icon:"🌙",label:"Sommeil",tipIcons:["🌡️","📵","🛏️"]},
      {key:"training",icon:"△",label:"Entraînement",tipIcons:["🏃","⏱️","💪"]},
      {key:"nutrition",icon:"🥗",label:"Nutrition",tipIcons:["🥦","💧","🍽️"]},
    ];
    const grid=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"12px"}});
    sections.forEach(s=>{
      const data=state.aiData?(state.aiData[s.key]||{score:0,summary:"",tips:[]}):null;
      const color=data?scoreColor(data.score):C.sub;
      const card=el("div",{style:{background:C.card,borderRadius:"18px",padding:"16px",position:"relative",overflow:"hidden"}});
      card.appendChild(el("div",{style:{position:"absolute",top:"0",left:"0",right:"0",height:"2px",background:`linear-gradient(90deg,${color},transparent)`}}));
      card.appendChild(el("div",{style:{display:"flex",alignItems:"center",gap:"6px",marginBottom:"12px"}},
        el("span",{style:{fontSize:"14px"}},s.icon),
        el("span",{style:{fontSize:"10px",fontWeight:"700",color:color,letterSpacing:"0.06em",textTransform:"uppercase"}},s.label)
      ));
      if(!state.aiData && state.aiLoading!==false){
        card.appendChild(el("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:"8px",padding:"16px 0"}},
          el("div",{style:{width:"14px",height:"14px",border:`2px solid ${color}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}),
          el("span",{style:{fontSize:"11px",color:C.sub}},"Analyse…")
        ));
      } else if(state.aiLoading===false && !state.aiData){
        card.appendChild(el("div",{style:{fontSize:"11px",color:C.red,textAlign:"center",padding:"12px 0"}},"⚠ IA indisponible"));
      } else if(data){
        card.appendChild(el("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:"12px"}},
          ringSVG(data.score||0,color,80),
          data.summary?el("p",{style:{fontSize:"11px",color:C.sub,textAlign:"center",lineHeight:"1.4",marginTop:"6px"}},data.summary):null
        ));
        const tipsRow=el("div",{style:{display:"flex",gap:"6px"}});
        (data.tips||[]).slice(0,3).forEach((tip,i)=>{
          tipsRow.appendChild(el("div",{style:{flex:"1",borderRadius:"10px",padding:"8px 4px",display:"flex",flexDirection:"column",alignItems:"center",gap:"4px",textAlign:"center",background:C.surface}},
            el("span",{style:{fontSize:"16px"}},s.tipIcons[i]||"✓"),
            el("span",{style:{fontSize:"9.5px",color:C.text,lineHeight:"1.3",fontWeight:"500"}},tip)
          ));
        });
        card.appendChild(tipsRow);
      }
      grid.appendChild(card);
    });
    main.appendChild(grid);
  }

  root.appendChild(main);
}

function saveAndCheck(answers){
  const k=new Date().toLocaleDateString("fr-FR");
  const allDone=QUESTIONS.every(q=>q.id in answers);
  if(allDone && !state.checkinDone){
    state.checkinAnswers={...answers};
    state.checkinDone=true;
    try{localStorage.setItem("apex_checkin_"+k,JSON.stringify(state.checkinAnswers));}catch(e){}
    sendCheckin(state.checkinAnswers);
    loadAI();
    render(); // re-render pour afficher les analyses IA
  } else if(state.checkinDone){
    state.checkinAnswers={...answers};
    try{localStorage.setItem("apex_checkin_"+k,JSON.stringify(state.checkinAnswers));}catch(e){}
    try{localStorage.removeItem("apex_ai_"+new Date().toISOString().slice(0,10));}catch(e){}
    // Pas de re-render — les boutons se mettent à jour directement
  }
}

function checkDone(){
  saveAndCheck(state.checkinCurrentAnswers);
}

function loadAI(){
  if(!state.checkinDone) return;
  const today=new Date().toISOString().slice(0,10);
  const cacheKey="apex_ai_"+today;
  try{const c=localStorage.getItem(cacheKey);if(c){state.aiData=JSON.parse(c);state.aiLoading=false;render();return;}}catch(e){}
  state.aiData=null; state.aiLoading=true;
  const deduped=Object.values(state.watchData.reduce((acc,r)=>{const k=String(r.date||"").substring(0,10);acc[k]=r;return acc;},{}));
  const todayRow=deduped[deduped.length-1]||{};
  getAllAIAdvice(todayRow,state.checkinAnswers).then(data=>{
    state.aiData=data; state.aiLoading=false;
    try{if(data)localStorage.setItem(cacheKey,JSON.stringify(data));}catch(e){}
    render();
  });
}

// Init
fetchAllData().then(({watch,checkin})=>{
  state.watchData=watch; state.checkinData=checkin;
  const todayKey=new Date().toLocaleDateString("fr-FR");
  const todayISO=new Date().toISOString().slice(0,10);
  // Charger l'âge réel
  try{const a=localStorage.getItem("apex_real_age");if(a)state.realAge=parseInt(a);}catch(e){}
  // Charger check-in
  try{const c=localStorage.getItem("apex_checkin_"+todayKey);if(c){state.checkinDone=true;state.checkinAnswers=JSON.parse(c);}}catch(e){}
  if(!state.checkinDone){
    const tc=checkin.filter(r=>{const d=String(r.date||r.Date||"");return d===todayKey||d.startsWith(todayISO);});
    const t=tc[tc.length-1];
    if(t){state.checkinDone=true;state.checkinAnswers=t;try{localStorage.setItem("apex_checkin_"+todayKey,JSON.stringify(t));}catch(e){}}
  }
  state.loading=false;
  render();
  if(state.checkinDone) loadAI();
});
</script>
</body>
</html>
